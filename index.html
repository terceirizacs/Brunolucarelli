<style>
:root,[data-theme="dark"]{--bg:#0a0e1a;--card:rgba(15,23,42,.65);--border:rgba(255,255,255,.06);--bh:rgba(139,124,247,.2);--shadow:rgba(0,0,0,.3);--t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;--accent:#8b7cf7;--a2:#a78bfa;--teal:#2dd4bf;--green:#34d399;--red:#f87171;--pink:#f472b6;--orange:#fb923c;--gold:#fbbf24;--sky:#38bdf8;--cyan:#22d3ee;--chart-bg:rgba(15,23,42,.4);--track-bg:rgba(255,255,255,.04);--track-fill:rgba(255,255,255,.06);--donut-hole:var(--bg);--login-bg:linear-gradient(135deg,#0a0e1a 0%,#1a1040 50%,#0a0e1a 100%)}
[data-theme="light"]{--bg:#f8fafc;--card:rgba(255,255,255,.85);--border:rgba(0,0,0,.08);--bh:rgba(139,124,247,.25);--shadow:rgba(0,0,0,.08);--t1:#0f172a;--t2:#475569;--t3:#94a3b8;--chart-bg:rgba(241,245,249,.6);--track-bg:rgba(0,0,0,.04);--track-fill:rgba(0,0,0,.06);--donut-hole:#f8fafc;--login-bg:linear-gradient(135deg,#f8fafc 0%,#ede9fe 50%,#f8fafc 100%)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t1);min-height:100vh;transition:all .3s}
.tt{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1e293b;color:#f1f5f9;padding:8px 14px;border-radius:10px;font-size:12px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;z-index:100;border:1px solid rgba(255,255,255,.1);box-shadow:0 8px 24px rgba(0,0,0,.3)}
*:hover>.tt{opacity:1}
#mainWrap{max-width:1440px;margin:0 auto;padding:24px 20px 60px}
@media(min-width:768px){#mainWrap{padding:32px 40px 60px}}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.header-left{display:flex;align-items:center;gap:16px}
.avatar{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--a2));display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;letter-spacing:-1px;flex-shrink:0}
@media(min-width:768px){.avatar{width:56px;height:56px;font-size:24px}}
.header h1{font-size:22px;font-weight:800;letter-spacing:-.5px}
@media(min-width:768px){.header h1{font-size:28px}}
.header .sub{font-size:13px;color:var(--t2);margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px}
.badge{font-size:12px;color:var(--t2);font-family:'JetBrains Mono';background:var(--card);border:1px solid var(--border);padding:6px 12px;border-radius:10px;display:none}
@media(min-width:768px){.badge{display:block}}
.theme-toggle{display:flex;gap:4px;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:3px}
.theme-btn{padding:5px 10px;border-radius:7px;border:none;background:transparent;color:var(--t3);font-size:14px;cursor:pointer;transition:all .2s}
.theme-btn.active{background:var(--accent);color:#fff}
nav{display:flex;gap:6px;margin-bottom:24px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tab-btn{padding:10px 18px;border-radius:14px;border:1px solid var(--border);background:var(--card);color:var(--t2);font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap;flex-shrink:0}
@media(min-width:768px){.tab-btn{padding:12px 24px;font-size:14px}}
.tab-btn:hover{border-color:var(--bh);color:var(--t1)}
.tab-btn.active{background:linear-gradient(135deg,var(--accent),var(--a2));color:#fff;border-color:transparent}
.tab-content{display:none}.tab-content.active{display:block}
.filter-bar{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:28px}
@media(min-width:768px){.filter-bar{padding:28px;border-radius:24px}}
.filter-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.filter-title{font-size:15px;font-weight:700}
.filter-actions{display:flex;gap:8px}
.filter-clear{padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--t2);font-size:12px;font-weight:600;cursor:pointer}
.filter-clear:hover{border-color:var(--red);color:var(--red)}
.filter-apply{padding:7px 14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:700;cursor:pointer}
.filter-grid{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:600px){.filter-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:900px){.filter-grid{grid-template-columns:repeat(4,1fr)}}
.filter-group{display:flex;flex-direction:column;gap:5px}
.filter-label{font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:1px}
.filter-date-row{display:flex;gap:6px}
.filter-date{flex:1;padding:9px;border-radius:9px;border:1px solid var(--border);background:var(--track-bg);color:var(--t1);font-size:13px;font-family:'JetBrains Mono'}
.ms-wrap{position:relative}
.ms-trigger{padding:9px 12px;border-radius:9px;border:1px solid var(--border);background:var(--track-bg);color:var(--t2);font-size:13px;cursor:pointer;user-select:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ms-trigger:hover,.ms-trigger.open{border-color:var(--accent);color:var(--t1)}
.ms-count{background:var(--accent);color:#fff;font-size:11px;padding:1px 7px;border-radius:7px;margin-left:4px;font-weight:700}
.ms-dropdown{position:absolute;top:100%;left:0;right:0;background:#1e293b;border:1px solid var(--border);border-radius:12px;max-height:240px;overflow-y:auto;z-index:50;display:none;box-shadow:0 12px 40px rgba(0,0,0,.4)}
[data-theme="light"] .ms-dropdown{background:#fff}
.ms-dropdown.show{display:block}
.ms-selall{padding:9px 12px;font-size:13px;color:var(--accent);cursor:pointer;border-bottom:1px solid var(--border);font-weight:600}
.ms-option{padding:7px 12px;font-size:13px;color:var(--t2);cursor:pointer;display:flex;align-items:center;gap:7px}
.ms-option:hover{background:rgba(139,124,247,.08);color:var(--t1)}
.ms-option.selected{background:rgba(139,124,247,.12);color:var(--accent)}
.ms-check{width:15px;height:15px;border-radius:4px;border:2px solid var(--border);flex-shrink:0}
.ms-option.selected .ms-check{background:var(--accent);border-color:var(--accent)}
.active-filters{display:flex;gap:6px;flex-wrap:wrap;margin-top:14px;align-items:center}
.filter-tag{padding:5px 12px;border-radius:9px;font-size:12px;font-weight:500;background:rgba(139,124,247,.1);border:1px solid rgba(139,124,247,.2);color:var(--accent);display:flex;align-items:center;gap:6px}
.filter-tag.neutral{background:rgba(255,255,255,.03);border-color:var(--border);color:var(--t3)}
.filter-tag .x{width:15px;height:15px;background:rgba(255,255,255,.1);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;cursor:pointer}
.results-badge{background:rgba(45,212,191,.08);border:1px solid rgba(45,212,191,.2);color:var(--teal);font-size:12px;font-family:'JetBrains Mono';padding:6px 14px;border-radius:9px;margin-left:auto}
.sec{font-size:14px;text-transform:uppercase;letter-spacing:2px;color:var(--t3);font-weight:600;margin:36px 0 18px;display:flex;align-items:center;gap:10px}
.sec::after{content:'';flex:1;height:1px;background:var(--border)}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;margin:24px 0;border-top:1px solid var(--border);padding-top:24px}
@media(min-width:900px){.kpis{grid-template-columns:repeat(4,1fr);gap:20px}}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;transition:all .3s}
@media(min-width:768px){.kpi{padding:32px 28px;border-radius:24px}}
.kpi:hover{transform:translateY(-2px);border-color:var(--bh);box-shadow:0 12px 36px var(--shadow)}
.kpi-bar{height:3px;border-radius:2px;margin-bottom:18px}
.kpi-l{font-size:12px;color:var(--t2);text-transform:uppercase;letter-spacing:1px;font-weight:500;margin-bottom:10px}
@media(min-width:768px){.kpi-l{font-size:13px}}
.kpi-v{font-size:28px;font-weight:700;font-family:'JetBrains Mono';line-height:1;letter-spacing:-1px}
@media(min-width:768px){.kpi-v{font-size:42px;letter-spacing:-2px}}
.kpi-s{font-size:12px;color:var(--t3);margin-top:8px;font-family:'JetBrains Mono'}
.g2{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:900px){.g2{grid-template-columns:1fr 1fr}}
.g3{display:grid;grid-template-columns:1fr;gap:20px}
@media(min-width:900px){.g3{grid-template-columns:1fr 1fr 1fr}}
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px;transition:all .3s}
@media(min-width:768px){.card{padding:32px;border-radius:24px}}
.card:hover{border-color:var(--bh);box-shadow:0 12px 40px var(--shadow)}
.card h3{font-size:18px;font-weight:700;margin-bottom:4px;letter-spacing:-.3px}
@media(min-width:768px){.card h3{font-size:20px}}
.card .d{font-size:13px;color:var(--t3);margin-bottom:20px}
.chart{height:300px;background:var(--chart-bg);border-radius:14px;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:768px){.chart{height:340px}}
.chart-bars{flex:1;display:flex;align-items:flex-end;gap:8px;padding:24px 12px 0}
@media(min-width:768px){.chart-bars{gap:14px;padding:24px 20px 0}}
.chart-labels{display:flex;gap:8px;padding:8px 12px 12px}
@media(min-width:768px){.chart-labels{gap:14px;padding:10px 20px 14px}}
.chart-lbl{flex:1;text-align:center;font-size:10px;color:var(--t3);font-weight:500;line-height:1.2}
@media(min-width:768px){.chart-lbl{font-size:11px}}
.bar{flex:1;border-radius:6px 6px 0 0;transition:all .3s;position:relative;cursor:default}
.bar:hover{filter:brightness(1.3)}
.donut-area{min-height:280px;background:var(--chart-bg);border-radius:14px;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:20px;cursor:default}
@media(min-width:768px){.donut-area{min-height:340px;gap:20px}}
.donut-ring{width:150px;height:150px;border-radius:50%;display:flex;align-items:center;justify-content:center;position:relative}
@media(min-width:768px){.donut-ring{width:180px;height:180px}}
.donut-center{text-align:center}
.donut-v{font-size:18px;font-weight:700;font-family:'JetBrains Mono';letter-spacing:-1px;line-height:1.1}
@media(min-width:768px){.donut-v{font-size:20px}}
.donut-lbl{font-size:12px;color:var(--t3)}
.donut-legend{display:flex;gap:10px;font-size:12px;color:var(--t2);flex-wrap:wrap;justify-content:center}
.donut-legend span{display:flex;align-items:center;gap:5px}
.donut-legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
.hbar-area{background:var(--chart-bg);border-radius:14px;padding:20px;display:flex;flex-direction:column;justify-content:center;gap:14px}
@media(min-width:768px){.hbar-area{padding:28px;gap:20px}}
.hbar-row{display:flex;align-items:center;gap:8px}
@media(min-width:768px){.hbar-row{gap:12px}}
.hbar-lbl{font-size:12px;color:var(--t2);min-width:100px;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(min-width:768px){.hbar-lbl{font-size:14px;min-width:140px}}
.hbar-track{flex:1;height:32px;background:var(--track-bg);border-radius:10px;overflow:visible;position:relative}
@media(min-width:768px){.hbar-track{height:38px}}
.hbar-fill{height:100%;border-radius:10px;display:flex;align-items:center;padding-left:10px;font-family:'JetBrains Mono';font-weight:600;font-size:12px;color:var(--t1);transition:width .6s;white-space:nowrap;overflow:visible}
@media(min-width:768px){.hbar-fill{font-size:14px;padding-left:14px}}
.hbar-pct{font-family:'JetBrains Mono';font-size:12px;font-weight:600;color:var(--t2);margin-left:6px;flex-shrink:0}
.ft-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--track-bg);flex-wrap:wrap}
@media(min-width:768px){.ft-row{gap:14px;padding:14px 0;flex-wrap:nowrap}}
.ft-row:last-child{border:none}
.ft-tag{padding:5px 12px;border-radius:12px;font-size:12px;font-weight:600;font-family:'JetBrains Mono';min-width:0;flex-shrink:0}
@media(min-width:768px){.ft-tag{min-width:220px;font-size:13px}}
.ft-qty{font-family:'JetBrains Mono';font-weight:700;font-size:14px;min-width:50px;text-align:right}
.ft-pct{font-family:'JetBrains Mono';font-size:13px;color:var(--t2);min-width:60px;text-align:right}
.ft-track{flex:1;height:7px;background:var(--track-fill);border-radius:4px;overflow:hidden;min-width:60px}
.ft-fill{height:100%;border-radius:4px}
.prog-area{height:280px;background:var(--chart-bg);border-radius:14px;display:flex;flex-direction:column;overflow:visible}
@media(min-width:768px){.prog-area{height:340px}}
.prog-bars{flex:1;display:flex;align-items:flex-end;gap:5px;padding:24px 10px 0}
@media(min-width:768px){.prog-bars{gap:8px;padding:24px 16px 0}}
.prog-labels{display:flex;gap:5px;padding:6px 10px 10px}
@media(min-width:768px){.prog-labels{gap:8px;padding:8px 16px 12px}}
.prog-lbl{flex:1;text-align:center;font-size:9px;color:var(--t3);font-family:'JetBrains Mono'}
@media(min-width:768px){.prog-lbl{font-size:10px}}
.prog-bar{flex:1;border-radius:5px 5px 0 0;position:relative;transition:all .3s;cursor:default}
.prog-pct{position:absolute;top:-18px;left:50%;transform:translateX(-50%);font-size:10px;font-family:'JetBrains Mono';font-weight:600;color:var(--t1);white-space:nowrap}
.ins-g{display:grid;grid-template-columns:1fr;gap:12px}
@media(min-width:768px){.ins-g{grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}}
.ins{padding:16px 20px;border-radius:14px;border:1px solid}
.ins.ok{background:rgba(52,211,153,.06);border-color:rgba(52,211,153,.2)}
.ins.w{background:rgba(248,113,113,.06);border-color:rgba(248,113,113,.2)}
.ins.i{background:rgba(139,124,247,.06);border-color:rgba(139,124,247,.2)}
.ins-t{font-size:14px;font-weight:700;margin-bottom:4px}
.ins-p{font-size:12px;color:var(--t2)}
.month-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;transition:all .3s}
.month-card:hover{border-color:var(--bh);box-shadow:0 8px 24px var(--shadow)}
.month-name{font-size:13px;color:var(--t2);font-weight:600;text-transform:uppercase;letter-spacing:1px}
.month-val{font-size:32px;font-weight:700;font-family:'JetBrains Mono';letter-spacing:-1px;margin:8px 0;color:var(--accent)}
.month-money{font-size:14px;font-family:'JetBrains Mono';color:var(--green);margin-bottom:4px}
.month-avg{font-size:12px;font-family:'JetBrains Mono';color:var(--t3)}
.month-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:600px){.month-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1000px){.month-grid{grid-template-columns:repeat(4,1fr)}}
.form-bar{display:flex;align-items:flex-end;gap:6px;padding:0 10px}
@media(min-width:768px){.form-bar{gap:10px;padding:0 16px}}
.form-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.form-fill{border-radius:6px 6px 0 0;width:100%;transition:all .3s}
.form-val{font-size:11px;font-family:'JetBrains Mono';font-weight:600;color:var(--t1)}
.form-lbl{font-size:10px;color:var(--t3);text-align:center}
.top-table{width:100%;border-collapse:separate;border-spacing:0;font-size:13px}
.top-table thead tr{background:var(--card)}
.top-table th{padding:10px 12px;text-align:left;font-weight:700;color:var(--t1);border-bottom:2px solid var(--border);white-space:nowrap}
.top-table th:nth-child(n+3){text-align:right}
.top-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--t2)}
.top-table td:nth-child(n+3){text-align:right;font-family:'JetBrains Mono'}
.top-table tr:hover td{background:var(--track-bg)}
.footer{text-align:center;padding:32px 0 16px;color:var(--t3);font-size:12px;border-top:1px solid var(--border);margin-top:48px}
/* Detalhamento table */
.det-table{width:100%;border-collapse:collapse;font-size:13px}
.det-table thead{position:sticky;top:0;z-index:2}
.det-table th{background:var(--card);padding:12px;text-align:left;border-bottom:2px solid var(--border);color:var(--accent);font-weight:700;cursor:pointer;white-space:nowrap;user-select:none}
.det-table th:hover{color:var(--t1);background:var(--track-bg)}
.det-table th .sort-icon{font-size:10px;margin-left:4px;color:var(--t3)}
.det-table td{padding:10px 12px;border-bottom:1px solid var(--border);color:var(--t2)}
.det-table tr:hover td{background:rgba(139,124,247,.04)}
.det-prog{display:inline-flex;align-items:center;gap:8px}
.det-prog-bar{width:80px;height:8px;background:var(--track-bg);border-radius:4px;overflow:hidden}
.det-prog-fill{height:100%;border-radius:4px;transition:width .3s}
.det-search{padding:10px 16px;border:1px solid var(--border);border-radius:12px;background:var(--card);color:var(--t1);font-size:14px;width:100%;max-width:400px;outline:none}
.det-search:focus{border-color:var(--accent)}
.det-status{padding:4px 10px;border-radius:8px;font-size:11px;font-weight:600}
.det-status.ativa{background:rgba(52,211,153,.12);color:var(--green)}
.det-status.cancelada{background:rgba(248,113,113,.12);color:var(--red)}
.det-status.concluida{background:rgba(139,124,247,.12);color:var(--accent)}
.det-respondeu.sim{color:var(--green);font-weight:600}
.det-respondeu.nao{color:var(--red);font-weight:600}
.det-pager{display:flex;gap:8px;justify-content:center;margin-top:16px;flex-wrap:wrap}
.det-pager button{padding:6px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--t2);font-size:13px;cursor:pointer}
.det-pager button.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.det-pager button:hover:not(.active){border-color:var(--accent);color:var(--t1)}
/* Tooltip styles */
.chart-tooltip{position:fixed;background:rgba(15,23,42,.95);color:#f1f5f9;padding:12px 16px;border-radius:12px;font-size:13px;pointer-events:none;z-index:9999;box-shadow:0 12px 40px rgba(0,0,0,.5);border:1px solid rgba(139,124,247,.3);backdrop-filter:blur(10px);max-width:280px;line-height:1.5;opacity:0;transition:opacity .15s}
.chart-tooltip.show{opacity:1}
.chart-tooltip .tt-title{font-weight:700;font-size:14px;margin-bottom:4px;color:var(--accent)}
.chart-tooltip .tt-row{display:flex;justify-content:space-between;gap:12px}
.chart-tooltip .tt-label{color:#94a3b8}
.chart-tooltip .tt-value{font-weight:600;font-family:'JetBrains Mono';color:#f1f5f9}
/* Login screen */
#loginScreen{position:fixed;inset:0;background:var(--login-bg);z-index:9999;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:56px 48px;text-align:center;max-width:420px;width:92%;box-shadow:0 24px 80px var(--shadow)}
.login-logo{width:80px;height:80px;border-radius:20px;object-fit:cover;margin-bottom:20px;box-shadow:0 4px 16px rgba(0,0,0,.2)}
.login-box h2{font-size:24px;font-weight:700;margin-bottom:4px}
.login-box p{font-size:14px;color:var(--t2);margin-bottom:32px}
.login-input{width:100%;padding:16px 20px;background:var(--bg);border:1px solid var(--border);border-radius:14px;color:var(--t1);font-family:'Inter';font-size:15px;outline:none;margin-bottom:14px}
.login-input:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:16px;background:var(--accent);border:none;border-radius:14px;color:#fff;font-family:'Inter';font-weight:600;font-size:15px;cursor:pointer;transition:all .2s}
.login-btn:hover{filter:brightness(1.1);transform:translateY(-1px)}
.login-error{color:var(--red);font-size:13px;margin-top:8px;display:none}
.hdr-logo{width:48px;height:48px;border-radius:16px;object-fit:cover}
@media(min-width:768px){.hdr-logo{width:56px;height:56px}}


.loading-overlay{position:fixed;inset:0;background:var(--bg);z-index:9998;display:none;align-items:center;justify-content:center;flex-direction:column;gap:24px}
.loading-spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:16px;color:var(--t2)}

</style>
</head>

// Normaliza qualquer formato de turma para "T7", "T17", etc.
// Exemplos:
//   "Mentoria T17 Orderbump T18 a T21" -> "T17"
//   "Turma17" / "Turma 07" -> "T17" / "T7"
//   "17" -> "T17"
//   "T17" -> "T17"
//   "[Ment.Cont.] - Anual" -> null
//   "16172450468" (telefone) -> null
function normTurmaStr(s){
  if(!s)return null;
  s=String(s).trim();
  if(!s)return null;
  // Telefones: 8+ dígitos puros -> null
  if(/^\d{8,}$/.test(s))return null;
  // "Turma" seguido de opcional espaço e dígitos
  var m=s.match(/Turma\s*0*(\d{1,2})/i);
  if(m)return 'T'+parseInt(m[1]);
  // "T" seguido de dígitos (word boundary) — ex: "Mentoria T17 Orderbump..."
  m=s.match(/\bT0*(\d{1,2})\b/);
  if(m)return 'T'+parseInt(m[1]);
  // "Mentoria" seguido de espaço e dígitos (sem T) — ex: "Mentoria 13"
  m=s.match(/Mentoria\s+0*(\d{1,2})\b/);
  if(m)return 'T'+parseInt(m[1]);
  // Só 1-2 dígitos puros — ex: "17", "05"
  m=s.match(/^0*(\d{1,2})$/);
  if(m)return 'T'+parseInt(m[1]);
  return null;
}
// Para arrematação: tenta turma2 (formulário) primeiro, depois turma (manual)
function normTurma(r){
  return normTurmaStr(r.turma2)||normTurmaStr(r.turma);
}
function getFA(){const ft=getMS('fTurma');
let rows=AR.filter(r=>{
  if(!normTurma(r))return false;
  // Excluir GA (Grupo de Arrematadores)
  if((r.nome||'').toLowerCase().includes('grupo'))return false;
  // Coluna D: somente arrematações "Válido"

function kpi(bg,l,v,s,c){const tipH='<div class=tt-title>'+l+'</div><div class=tt-row><span class=tt-label>Valor:</span><span class=tt-value>'+v+'</span></div>'+(s?'<div class=tt-row><span class=tt-label>Detalhe:</span><span class=tt-value>'+s+'</span></div>':'');return'<div class="kpi" onmouseenter="showTip(event,\''+tipH.replace(/'/g,'')+'\')" onmousemove="showTip(event,\''+tipH.replace(/'/g,'')+'\')" onmouseleave="hideTip()"><div class="kpi-bar" style="background:'+bg+'"></div><div class="kpi-l">'+l+'</div><div class="kpi-v" style="color:'+c+'">'+v+'</div>'+(s?'<div class="kpi-s">'+s+'</div>':'')+'</div>';}

function donut2(c1,deg,c2,cv,cl,l1,n1,lc1,l2,n2,lc2){const t=n1+n2;const p1=t?rd(n1/t*100):0;const p2=t?rd(n2/t*100):0;return'<div class="donut-ring" style="background:conic-gradient('+c1+' 0deg '+deg+'deg,'+c2+' '+deg+'deg 360deg);cursor:pointer" onmouseenter="showTip(event,\'<div class=tt-title>'+cl+'</div><div class=tt-row><span class=tt-label>'+l1+':</span><span class=tt-value>'+n1+' ('+fP(p1)+')</span></div><div class=tt-row><span class=tt-label>'+l2+':</span><span class=tt-value>'+n2+' ('+fP(p2)+')</span></div>\')" onmousemove="showTip(event,\'<div class=tt-title>'+cl+'</div><div class=tt-row><span class=tt-label>'+l1+':</span><span class=tt-value>'+n1+' ('+fP(p1)+')</span></div><div class=tt-row><span class=tt-label>'+l2+':</span><span class=tt-value>'+n2+' ('+fP(p2)+')</span></div>\')" onmouseleave="hideTip()"><div style="width:110px;height:110px;background:var(--donut-hole);border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none"><div class="donut-center"><div class="donut-v" style="color:'+c1+'">'+cv+'</div><div class="donut-lbl">'+cl+'</div></div></div></div><div class="donut-legend"><span><i style="background:'+lc1+'"></i>'+l1+' ('+n1+')</span><span><i style="background:'+lc2+'"></i>'+l2+' ('+n2+')</span></div>';}

function multiD(data,colors){const t=Object.values(data).reduce((a,b)=>a+b,0);if(!t)return'<div style="color:var(--t3);padding:40px">Sem dados</div>';let g='conic-gradient(',d=0;const k=Object.keys(data).sort((a,b)=>data[b]-data[a]);k.forEach(x=>{if(data[x]){const p=data[x]/t*360;g+=colors[x]+' '+d+'deg '+Math.round(d+p)+'deg,';d+=p;}});g=g.slice(0,-1)+')';let lg='';let tipRows='';k.forEach(x=>{if(data[x]){const p=rd(data[x]/t*100);lg+='<span style="cursor:pointer" onmouseenter="showTip(event,\'<div class=tt-title>'+x.replace(/'/g,'')+'</div><div class=tt-row><span class=tt-label>Quantidade:</span><span class=tt-value>'+fN(data[x])+'</span></div><div class=tt-row><span class=tt-label>% do total:</span><span class=tt-value>'+fP(p)+'</span></div>\')" onmousemove="showTip(event,\'<div class=tt-title>'+x.replace(/'/g,'')+'</div><div class=tt-row><span class=tt-label>Quantidade:</span><span class=tt-value>'+fN(data[x])+'</span></div><div class=tt-row><span class=tt-label>% do total:</span><span class=tt-value>'+fP(p)+'</span></div>\')" onmouseleave="hideTip()"><i style="background:'+colors[x]+'"></i>'+x+' ('+fN(data[x])+' · '+fP(p)+')</span>';tipRows+='<div class=tt-row><span class=tt-label>'+x.replace(/'/g,'')+':</span><span class=tt-value>'+fN(data[x])+' ('+fP(p)+')</span></div>';}});const ringTip='<div class=tt-title>Total: '+fN(t)+'</div>'+tipRows;return'<div class="donut-ring" style="background:'+g+';cursor:pointer" onmouseenter="showTip(event,\''+ringTip.replace(/'/g,'')+'\')" onmousemove="showTip(event,\''+ringTip.replace(/'/g,'')+'\')" onmouseleave="hideTip()"><div style="width:110px;height:110px;background:var(--donut-hole);border-radius:50%;display:flex;align-items:center;justify-content:center;pointer-events:none"><div class="donut-center"><div class="donut-v">'+fN(t)+'</div><div class="donut-lbl">total</div></div></div></div><div class="donut-legend">'+lg+'</div>';}

function hbarChart(items, color, totalForPct){
  let h='';const mx=Math.max(...items.map(i=>i[1]),1);
  items.forEach(([lbl,cnt])=>{
    const w=Math.max(Math.round(cnt/mx*100),3);
    const pct=totalForPct?fP(rd(cnt/totalForPct*100)):'';
    const safe=String(lbl).replace(/'/g,'').replace(/"/g,'');
    h+='<div class="hbar-row" data-hlbl="'+safe+'" data-hcnt="'+fN(cnt)+'" data-hpct="'+pct+'" onmouseenter="hbarTip(event,this)" onmousemove="hbarTip(event,this)" onmouseleave="hideTip()"><span class="hbar-lbl">'+lbl+'</span><div class="hbar-track"><div class="hbar-fill" style="width:'+w+'%;background:'+color+'">'+fN(cnt)+'</div></div>'+(pct?'<span class="hbar-pct">'+pct+'</span>':'')+'</div>';
  });
  return h;
}

    });
    a+='</div>';
    // Summary
    const totalMC=mKeys.reduce((s,k)=>s+byMonth[k].cnt,0);
    const totalMV=mKeys.reduce((s,k)=>s+byMonth[k].val,0);
    const allVals=mKeys.flatMap(k=>byMonth[k].vals);
    const avgAll=allVals.length?totalMV/allVals.length:0;
    a+='<div style="display:flex;gap:20px;flex-wrap:wrap;margin-top:16px;justify-content:center">';
    a+='<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 24px;text-align:center"><div style="font-size:13px;color:var(--t3)">Total Período</div><div style="font-size:28px;font-weight:700;font-family:JetBrains Mono;color:var(--accent)">'+fN(totalMC)+'</div></div>';
    a+='<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 24px;text-align:center"><div style="font-size:13px;color:var(--t3)">Volume Total</div><div style="font-size:28px;font-weight:700;font-family:JetBrains Mono;color:var(--green)">'+fR(totalMV)+'</div></div>';
    a+='<div style="background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px 24px;text-align:center"><div style="font-size:13px;color:var(--t3)">Média por Imóvel</div><div style="font-size:28px;font-weight:700;font-family:JetBrains Mono;color:var(--gold)">'+fR(avgAll)+'</div></div>';
    a+='</div>';
  }

  // Formulários preenchidos (Submission Date Sept 2025+)
  a+='<div class="sec">📝 Preenchimento de Formulários (Set/2025+)</div>';
  const formMonth={};
  AR.forEach(r=>{
    if(!r.submissionDate||r.submissionDate<SEPT25)return;
    const dt=new Date(r.submissionDate);
    const k=dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0');
    formMonth[k]=(formMonth[k]||0)+1;
  });
  const fmKeys=Object.keys(formMonth).sort();
  if(fmKeys.length){
    const mxFm=Math.max(...fmKeys.map(k=>formMonth[k]),1);
    const totalFm=fmKeys.reduce((s,k)=>s+formMonth[k],0);
    a+='<div class="card"><h3>Preenchimento de Formulário por Mês</h3><div class="d">Total: '+fN(totalFm)+' formulários desde Set/2025</div><div class="chart"><div class="chart-bars">';
    fmKeys.forEach(k=>{
      const [y,m]=k.split('-');const v=formMonth[k];const hh=Math.round(v/mxFm*90);const mn=monthNames[parseInt(m)]+'/'+y.slice(2);const pctFm=rd(v/totalFm*100);
      a+='<div class="bar" style="height:'+Math.max(hh,4)+'%;background:var(--accent)" onmouseenter="showTip(event,\'<div class=tt-title>'+mn+'</div><div class=tt-row><span class=tt-label>Formulários:</span><span class=tt-value>'+v+'</span></div><div class=tt-row><span class=tt-label>% do total:</span><span class=tt-value>'+fP(pctFm)+'</span></div>\')" onmousemove="showTip(event,\'<div class=tt-title>'+mn+'</div><div class=tt-row><span class=tt-label>Formulários:</span><span class=tt-value>'+v+'</span></div><div class=tt-row><span class=tt-label>% do total:</span><span class=tt-value>'+fP(pctFm)+'</span></div>\')" onmouseleave="hideTip()"><span style="position:absolute;top:-20px;left:50%;transform:translateX(-50%);font-size:10px;font-family:JetBrains Mono;font-weight:600;color:var(--t1);white-space:nowrap">'+v+'</span></div>';
    });
    a+='</div><div class="chart-labels">';
    fmKeys.forEach(k=>{const [y,m]=k.split('-');a+='<div class="chart-lbl">'+monthNames[parseInt(m)]+'/'+y.slice(2)+'</div>';});
    a+='</div></div></div>';
  }

  // Insights
  a+='<div class="sec">💡 Insights</div><div class="ins-g">';
  if(eco>0)a+='<div class="ins ok"><div class="ins-t">✅ Economia média de '+fP(eco)+' vs mercado</div><div class="ins-p">Desconto significativo nas arrematações.</div></div>';
  const ocOc=ocI['Ocupado']||0,ocDe=ocI['Desocupado']||0;
  if(ocOc>ocDe)a+='<div class="ins i"><div class="ins-t">ℹ️ Maioria ocupados ('+fN(ocOc)+' vs '+fN(ocDe)+' desocupados)</div><div class="ins-p">Suporte para desocupação pode ser necessário.</div></div>';
  a+='</div>';
  document.getElementById('cArr').innerHTML=a;

  // ===== DETALHAMENTO DO ALUNO =====
  renderDetalhamento(cs);
}

let _detData=[],_detSort='nome',_detDir=1,_detPage=0,_detPerPage=20,_detSearch='';
function renderDetalhamento(cs){
  _detData=cs.map(r=>{
    const nt=normTurmaStr(r.turma)||'-';
    const prog=r.progresso!=null?r.progresso:0;
    const aulas=r.aulasCompletas!=null?r.aulasCompletas:0;
    const totalA=r.totalAulas||0;
    const ult=r.ultAcesso?new Date(r.ultAcesso):null;
    // Respondeu = coluna AB (mensagemAluno) tem conteúdo
    const respondeu=!!(r.mensagemAluno && String(r.mensagemAluno).trim());
    return{
      nome:r.nome||'-',turma:nt,prog:prog,
      aulas:aulas,totalAulas:totalA,aulasStr:aulas+'/'+totalA,
      ultAcesso:ult,ultAcessoStr:ult?ult.toLocaleDateString('pt-BR'):'-',
      respondeu:respondeu
    };
  });
  _detPage=0;_detSearch='';
  drawDetTable();
}
function drawDetTable(fromSearch){
  let data=_detData;
  if(_detSearch){const s=_detSearch.toLowerCase();data=data.filter(r=>r.nome.toLowerCase().includes(s)||r.turma.toLowerCase().includes(s));}
  data.sort((a,b)=>{let va=a[_detSort],vb=b[_detSort];if(typeof va==='string')va=va.toLowerCase();if(typeof vb==='string')vb=vb.toLowerCase();if(va==null)va='';if(vb==null)vb='';return va<vb?-_detDir:va>vb?_detDir:0;});
  const totalR=data.length;const totalPages=Math.ceil(totalR/_detPerPage);
  if(_detPage>=totalPages)_detPage=Math.max(0,totalPages-1);
  const start=_detPage*_detPerPage;const slice=data.slice(start,start+_detPerPage);
  // Search bar — only rebuild if not coming from search input (to keep focus)
  const cDet=document.getElementById('cDet');
  if(!fromSearch||!cDet.querySelector('.det-search')){
    let top='<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:16px">';
    top+='<input class="det-search" placeholder="Buscar aluno..." value="'+_detSearch+'" oninput="_detSearch=this.value;_detPage=0;drawDetTable(true)">';
    top+='<span class="det-count" style="color:var(--t3);font-size:13px">'+fN(totalR)+' aluno(s)</span></div>';
    top+='<div id="detTableArea"></div>';
    cDet.innerHTML=top;
  } else {
    const countEl=cDet.querySelector('.det-count');if(countEl)countEl.textContent=fN(totalR)+' aluno(s)';
  }
  let d='<div style="overflow-x:auto"><table class="det-table"><thead><tr>';
  const colDefs=[
    {key:'nome',label:'ALUNO'},
    {key:'turma',label:'TURMA'},
    {key:'prog',label:'PROGRESSO'},
    {key:'aulas',label:'AULAS COMPLETAS'},
    {key:'ultAcessoStr',label:'ÚLTIMO ACESSO'},
    {key:'respondeu',label:'RESPONDEU'}
  ];
  colDefs.forEach(c=>{const icon=_detSort===c.key?(_detDir===1?' ↑':' ↓'):'';d+='<th onclick="detSort(\''+c.key+'\')">'+c.label+'<span class="sort-icon">'+icon+'</span></th>';});
  d+='</tr></thead><tbody>';
  slice.forEach(r=>{
    d+='<tr>';
    d+='<td style="font-weight:600;color:var(--t1);white-space:nowrap">'+r.nome+'</td>';
    d+='<td>'+r.turma+'</td>';
    // Progresso bar
    const pCol=r.prog>70?'var(--green)':r.prog>30?'var(--gold)':'var(--red)';
    d+='<td><div class="det-prog"><div class="det-prog-bar"><div class="det-prog-fill" style="width:'+r.prog+'%;background:'+pCol+'"></div></div><span style="font-family:JetBrains Mono;font-size:12px">'+r.prog+'%</span></div></td>';
    // Aulas completas
    const aPct=r.totalAulas>0?rd(r.aulas/r.totalAulas*100):0;
    const aCol=aPct>70?'var(--green)':aPct>30?'var(--gold)':'var(--red)';
    d+='<td><div class="det-prog"><div class="det-prog-bar"><div class="det-prog-fill" style="width:'+aPct+'%;background:'+aCol+'"></div></div><span style="font-family:JetBrains Mono;font-size:12px">'+r.aulasStr+'</span></div></td>';
    // Último Acesso
    const uCol=r.ultAcesso?'var(--t2)':'var(--red)';
    d+='<td style="font-family:JetBrains Mono;font-size:12px;color:'+uCol+'">'+r.ultAcessoStr+'</td>';
    // Respondeu (coluna AB - Mensagem Aluno)
    d+='<td><span class="det-respondeu '+(r.respondeu?'sim':'nao')+'">'+(r.respondeu?'Sim':'Não')+'</span></td>';
    d+='</tr>';
  });
  d+='</tbody></table></div>';
  // Pagination
  if(totalPages>1){
    d+='<div class="det-pager">';
    if(_detPage>0)d+='<button onclick="detPage(0)">«</button><button onclick="detPage('+(_detPage-1)+')">‹</button>';
    const startP=Math.max(0,_detPage-3),endP=Math.min(totalPages,_detPage+4);
    for(let p=startP;p<endP;p++){d+='<button class="'+(p===_detPage?'active':'')+'" onclick="detPage('+p+')">'+(p+1)+'</button>';}
    if(_detPage<totalPages-1)d+='<button onclick="detPage('+(_detPage+1)+')">›</button><button onclick="detPage('+(totalPages-1)+')">»</button>';
    d+='</div>';
  }
  const area=document.getElementById('detTableArea');if(area)area.innerHTML=d;
}
function detSort(key){if(_detSort===key)_detDir*=-1;else{_detSort=key;_detDir=1;}_detPage=0;drawDetTable(false);}
function detPage(p){_detPage=p;drawDetTable(false);}

</script></body></html>
